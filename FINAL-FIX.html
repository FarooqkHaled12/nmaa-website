<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Fix Test - Nmaa</title>
    <link rel="stylesheet" href="pages/shared/style.css">
    <link rel="stylesheet" href="pages/shared/header.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #8B1538 0%, #6E1030 100%);
        }
        .hero {
            padding: 150px 20px;
            text-align: center;
            color: white;
        }
        .hero h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        .status-box {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 20px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 14px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 9999;
        }
        .status-box .success { color: #4caf50; }
        .status-box .error { color: #f44336; }
        .status-box .info { color: #2196f3; }
    </style>
</head>
<body>
    <!-- Navbar -->
    <div id="navbar-placeholder" data-header-class="transparent-header"></div>

    <div class="hero">
        <h1>✅ Final Fix Test</h1>
        <p>اختبار الإصلاح النهائي</p>
    </div>

    <div class="status-box" id="statusBox">
        <div class="info">⏳ Loading...</div>
    </div>

    <script src="pages/shared/translations.js"></script>
    <script src="pages/shared/header.js"></script>
    
    <script>
        const statusBox = document.getElementById('statusBox');
        const logs = [];
        
        function addLog(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            logs.push(`<div class="${type}">[${timestamp}] ${message}</div>`);
            statusBox.innerHTML = logs.join('');
            statusBox.scrollTop = statusBox.scrollHeight;
        }
        
        addLog('🚀 Page loaded', 'info');
        
        // Monitor navbar loading
        let checkCount = 0;
        const checkInterval = setInterval(() => {
            checkCount++;
            const menuToggle = document.getElementById('menuToggle');
            const mobileMenu = document.getElementById('mobileMenu');
            
            if (menuToggle && mobileMenu) {
                clearInterval(checkInterval);
                addLog('✅ Elements found!', 'success');
                addLog(`menuToggle: ${!!menuToggle}`, 'success');
                addLog(`mobileMenu: ${!!mobileMenu}`, 'success');
                
                // Attach manual handler
                menuToggle.addEventListener('click', (e) => {
                    e.preventDefault();
                    addLog('🎯 Button clicked!', 'info');
                    
                    const isActive = mobileMenu.classList.contains('active');
                    
                    if (isActive) {
                        mobileMenu.classList.remove('active');
                        menuToggle.classList.remove('active');
                        document.body.style.overflow = '';
                        document.body.style.position = '';
                        addLog('📂 Menu closed', 'info');
                    } else {
                        mobileMenu.classList.add('active');
                        menuToggle.classList.add('active');
                        document.body.style.overflow = 'hidden';
                        document.body.style.position = 'fixed';
                        document.body.style.width = '100%';
                        document.body.style.top = `-${window.scrollY}px`;
                        addLog('📂 Menu opened', 'success');
                    }
                });
                
                addLog('✅ Click handler attached', 'success');
                addLog('🎉 Ready to test!', 'success');
                
            } else if (checkCount > 50) {
                clearInterval(checkInterval);
                addLog('❌ Timeout! Elements not found', 'error');
                addLog(`menuToggle: ${!!menuToggle}`, 'error');
                addLog(`mobileMenu: ${!!mobileMenu}`, 'error');
            }
        }, 100);
        
        // Listen for navbar loaded event
        document.addEventListener('navbarLoaded', () => {
            addLog('📢 navbarLoaded event fired', 'info');
        });
        
        // Window load
        window.addEventListener('load', () => {
            addLog('🏁 Window fully loaded', 'info');
        });
    </script>
</body>
</html>
