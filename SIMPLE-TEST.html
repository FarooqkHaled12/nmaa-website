<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Mobile Menu Test</title>
    <link rel="stylesheet" href="pages/shared/header.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        .test-content {
            padding: 200px 20px;
            text-align: center;
        }
        .test-button {
            padding: 15px 30px;
            font-size: 18px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
        }
        .test-button:hover {
            background: #0056b3;
        }
        .console-output {
            background: #f5f5f5;
            padding: 20px;
            margin: 20px;
            border-radius: 8px;
            text-align: left;
            font-family: monospace;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <h1 style="text-align: center; padding: 20px;">🧪 Simple Mobile Menu Test</h1>
    
    <div class="test-content">
        <h2>Test 1: Load Navbar Directly</h2>
        <button class="test-button" onclick="testLoadNavbar()">Load Navbar</button>
        
        <h2>Test 2: Check Elements</h2>
        <button class="test-button" onclick="testCheckElements()">Check Elements</button>
        
        <h2>Test 3: Test Click</h2>
        <button class="test-button" onclick="testClick()">Test Menu Toggle Click</button>
        
        <div class="console-output" id="output">Console output will appear here...</div>
    </div>

    <script>
        const output = document.getElementById('output');
        
        function log(message) {
            console.log(message);
            output.textContent += message + '\n';
        }
        
        function testLoadNavbar() {
            output.textContent = '🧪 Test 1: Loading navbar.html...\n';
            
            fetch('pages/shared/navbar.html')
                .then(response => {
                    log('✅ Fetch Status: ' + response.status);
                    if (!response.ok) {
                        throw new Error('HTTP ' + response.status);
                    }
                    return response.text();
                })
                .then(html => {
                    log('✅ HTML Length: ' + html.length + ' characters');
                    log('✅ Contains #header: ' + html.includes('id="header"'));
                    log('✅ Contains #menuToggle: ' + html.includes('id="menuToggle"'));
                    log('✅ Contains #mobileMenu: ' + html.includes('id="mobileMenu"'));
                    
                    // Insert into body
                    const tempDiv = document.createElement('div');
                    tempDiv.innerHTML = html;
                    const header = tempDiv.querySelector('#header');
                    
                    if (header) {
                        document.body.insertBefore(header, document.body.firstChild);
                        log('✅ Header inserted into DOM');
                        log('✅ Ready for Test 2!');
                    } else {
                        log('❌ No header element found!');
                    }
                })
                .catch(error => {
                    log('❌ Error: ' + error.message);
                });
        }
        
        function testCheckElements() {
            output.textContent = '🧪 Test 2: Checking elements in DOM...\n';
            
            const header = document.getElementById('header');
            const menuToggle = document.getElementById('menuToggle');
            const mobileMenu = document.getElementById('mobileMenu');
            
            log('Header: ' + (header ? '✅ FOUND' : '❌ NOT FOUND'));
            log('Menu Toggle: ' + (menuToggle ? '✅ FOUND' : '❌ NOT FOUND'));
            log('Mobile Menu: ' + (mobileMenu ? '✅ FOUND' : '❌ NOT FOUND'));
            
            if (header) log('Header tag: ' + header.tagName);
            if (menuToggle) log('Toggle tag: ' + menuToggle.tagName);
            if (mobileMenu) log('Menu tag: ' + mobileMenu.tagName);
            
            if (menuToggle && mobileMenu) {
                log('✅ Ready for Test 3!');
            } else {
                log('❌ Run Test 1 first!');
            }
        }
        
        function testClick() {
            output.textContent = '🧪 Test 3: Testing menu toggle click...\n';
            
            const menuToggle = document.getElementById('menuToggle');
            const mobileMenu = document.getElementById('mobileMenu');
            
            if (!menuToggle || !mobileMenu) {
                log('❌ Elements not found! Run Test 1 first.');
                return;
            }
            
            // Attach event listener
            menuToggle.addEventListener('click', function(e) {
                log('🎯 Click event fired!');
                e.preventDefault();
                
                if (mobileMenu.classList.contains('active')) {
                    mobileMenu.classList.remove('active');
                    menuToggle.classList.remove('active');
                    log('📂 Menu closed');
                } else {
                    mobileMenu.classList.add('active');
                    menuToggle.classList.add('active');
                    log('📂 Menu opened');
                }
                
                log('Menu classes: ' + mobileMenu.className);
            });
            
            log('✅ Event listener attached');
            log('✅ Now click the hamburger button (☰) in the header');
        }
    </script>
</body>
</html>
